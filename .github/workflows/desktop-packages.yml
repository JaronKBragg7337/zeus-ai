name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle: msi
          - os: macos-latest
            bundle: dmg
          - os: ubuntu-22.04
            bundle: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux packaging libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: python -m pip install -r backend/requirements.txt pyinstaller
      - working-directory: frontend
        run: pnpm install --frozen-lockfile
      - run: python scripts/build_backend_sidecar.py --skip-dependency-install
      - working-directory: frontend
        run: pnpm exec tauri build --bundles ${{ matrix.bundle }}
      - uses: actions/upload-artifact@v4
        with:
          name: zeus-${{ matrix.os }}
          path: frontend/src-tauri/target/release/bundle/
          if-no-files-found: error
